<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Plenty of Names</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: #1a1a1a; color: #fff; }
  html { overflow-y: scroll; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  .banner {
    position: relative;
    background: #000000;
    text-align: center;
    border-bottom: 3px solid #629aa9;
  }
  .banner img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 320px;
    object-fit: contain;
    margin: 0 auto;
  }
  .banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: #ffffff;
    opacity: 0.07;
    pointer-events: none;
  }

  .tabs {
    display: flex;
    justify-content: center;
    background: #222;
    border-bottom: 1px solid #333;
  }
  .tab {
    flex: 0 0 auto;
    padding: 14px 28px;
    cursor: pointer;
    background: none;
    border: none;
    color: #aaa;
    font-size: 1rem;
    font-family: inherit;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab:hover { color: #fff; }
  .tab.active {
    color: #fff;
    border-bottom-color: #629aa9;
  }

  .tab-content {
    flex: 1;
    display: none;
    min-height: 0;
  }
  .tab-content.active { display: flex; }
  .tab-content iframe {
    width: 100%;
    flex: 1;
    border: none;
    background: #fff;
    min-height: 70vh;
  }

  .software-page {
    flex: 1;
    # background: #F8F8F8;
    background: #121212;
    color: #333;
    padding: 60px 40px;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 220px));
    gap: 40px;
    justify-content: center;
  }
  .tile {
    text-align: left;
    text-decoration: none;
    color: #333;
    display: block;
  }
  .tile-cover {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 10px;
  }
  .tile-title {
    display: block;
    color: #2DBAE1;
    font-size: 0.95rem;
    line-height: 1.3;
  }
  .tile-artist {
    display: block;
    color: #666;
    font-size: 0.85rem;
    margin-top: 2px;
  }
  .tile:hover .tile-title { text-decoration: underline; }
</style>
</head>
<body>
  <header class="banner">
    <img src="plonc_banner_clean.png" alt="Plenty of Names">
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" data-target="music">Music</button>
    <button class="tab" role="tab" data-target="shows">Software</button>
  </nav>

  <section id="music" class="tab-content active">
    <iframe src="https://plentyofnames.bandcamp.com" title="Music"></iframe>
  </section>
  <section id="shows" class="tab-content">
    <div class="software-page">
      <div class="tile-grid">
        <a class="tile" href="#">
          <div class="tile-cover">cover</div>
          <span class="tile-title">Project One</span>
          <span class="tile-artist">by Plenty of Names</span>
        </a>
        <a class="tile" href="#">
          <div class="tile-cover">cover</div>
          <span class="tile-title">Project Two</span>
          <span class="tile-artist">by Plenty of Names</span>
        </a>
      </div>
    </div>
  </section>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.target;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        contents.forEach(c => c.classList.toggle('active', c.id === target));
      });
    });
  </script>
</body>
</html>
