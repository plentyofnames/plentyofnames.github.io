<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Plenty of Names</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="banner">
    <img src="plonc_banner_clean.png" alt="Plenty of Names">
  </header>

  <nav class="tabs" role="tablist">
    <a class="tabs-logo" href="#music" title="Home">
      <img src="plonc.png" alt="PLONC">
    </a>
    <button class="tab active" role="tab" data-target="music">Music</button>
    <button class="tab" role="tab" data-target="shows">Software</button>
    <div class="social-links">
      <a href="https://www.instagram.com/plentyofnames" target="_blank" rel="noopener" title="Instagram">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10m0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6"/></svg>
      </a>
      <a href="https://www.soundcloud.com/plentyofnames" target="_blank" rel="noopener" title="SoundCloud">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.56 8.87V17h8.76c1.85 0 2.68-1.4 2.68-2.82 0-1.42-.83-2.82-2.68-2.82-.37 0-.73.07-1.06.2A5.05 5.05 0 0 0 14.28 7c-.98 0-1.88.35-2.72.87M10 9.24c-.5-.35-1.03-.6-1.6-.73V17H10V9.24M7 8.36c-.32-.06-.64-.09-.97-.09-.34 0-.67.04-1 .1V17h1.97V8.36M3.68 8.86C2.08 9.64 1 11.27 1 13.15c0 1.88 1.08 3.51 2.68 4.29V8.86"/></svg>
      </a>
    </div>
  </nav>

  <section id="music" class="tab-content active">
    <div class="album-embeds">
      <div class="album-card">
        <a class="bandcamp-placeholder" href="https://plentyofnames.bandcamp.com" target="_blank" rel="noopener" aria-label="Listen on Bandcamp">
          <svg viewBox="0 0 48 48" fill="currentColor"><path d="M0 34.125l14.025-20.25H48L33.975 34.125z"/></svg>
          <span>bandcamp</span>
        </a>
        <iframe data-src="https://bandcamp.com/EmbeddedPlayer/album=704217594/size=large/bgcol=1a1a1a/linkcol=2DBAE1/tracklist=true/transparent=true/" title="Magic People Mover EP"></iframe>
        <a class="vinyl-link" href="https://www.discogs.com/release/36471667-Thronvio-Magic-People-Mover-EP" target="_blank" rel="noopener">Also available on vinyl</a>
      </div>
      <div class="album-card">
        <a class="bandcamp-placeholder" href="https://plentyofnames.bandcamp.com" target="_blank" rel="noopener" aria-label="Listen on Bandcamp">
          <svg viewBox="0 0 48 48" fill="currentColor"><path d="M0 34.125l14.025-20.25H48L33.975 34.125z"/></svg>
          <span>bandcamp</span>
        </a>
        <iframe data-src="https://bandcamp.com/EmbeddedPlayer/album=3722911460/size=large/bgcol=1a1a1a/linkcol=2DBAE1/tracklist=true/transparent=true/" title="Continuum Mechanics EP"></iframe>
        <a class="vinyl-link" href="https://www.discogs.com/release/34166653-Giorgio-Spinetti-Continuum-Mechanics-EP" target="_blank" rel="noopener">Also available on vinyl</a>
      </div>
    </div>
  </section>
  <section id="shows" class="tab-content">
    <div class="software-page" data-view="grid">
      <div class="tile-grid">
        <a class="tile" href="#" data-project="plock">
          <div class="tile-cover"></div>
          <span class="tile-title">PLOCK</span>
          <span class="tile-artist">Elektron Analog Rytm pattern editor</span>
        </a>
        <a class="tile" href="#" data-project="stolperbeats">
          <div class="tile-cover stolperbeats-cover"></div>
          <span class="tile-title">TRIPWIRE</span>
          <span class="tile-artist">Stolperbeats pattern editor</span>
        </a>
      </div>
      <iframe class="software-frame" title="Software"></iframe>
    </div>
  </section>

  <div class="consent-backdrop" id="consent-banner">
    <div class="consent-banner">
      <p>Diese Website bindet Inhalte von Bandcamp ein. Weitere Informationen in unserer <a href="#datenschutz" class="legal-link" data-legal="datenschutz.html">Datenschutzerklärung</a>.</p>
      <div class="consent-actions">
        <button id="consent-accept">Akzeptieren</button>
        <button id="consent-decline">Ablehnen</button>
      </div>
    </div>
  </div>

  <div class="legal-overlay" id="legal-overlay">
    <iframe class="legal-frame" id="legal-frame" title="Legal"></iframe>
  </div>

  <footer class="site-footer">
    <a href="#impressum" class="legal-link" data-legal="impressum.html">Impressum</a>
    <a href="#datenschutz" class="legal-link" data-legal="datenschutz.html">Datenschutzerklärung</a>
  </footer>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    const softwarePage = document.querySelector('.software-page');
    const softwareFrame = document.querySelector('.software-frame');
    const legalOverlay = document.getElementById('legal-overlay');
    const legalFrame = document.getElementById('legal-frame');

    const projectUrls = {
      plock: 'https://plentyofnam.es/plock/plock.html',
      stolperbeats: 'https://plentyofnam.es/tripwire/'
    };

    const tabTargets = { music: 'music', software: 'shows' };

    const resetSoftwareView = () => {
      softwarePage.dataset.view = 'grid';
      softwareFrame.src = 'about:blank';
      document.body.dataset.softwareView = 'grid';
    };

    const openLegal = (file) => {
      legalFrame.src = file;
      legalOverlay.classList.add('active');
      document.body.dataset.softwareView = 'frame';
    };

    const closeLegal = () => {
      legalOverlay.classList.remove('active');
      legalFrame.src = 'about:blank';
      document.body.dataset.softwareView = 'grid';
    };

    const consentBanner = document.getElementById('consent-banner');
    const CONSENT_KEY = 'bandcamp-consent';

    const loadMusicEmbeds = () => {
      if (localStorage.getItem(CONSENT_KEY) !== 'accepted') return;
      document.querySelectorAll('#music iframe[data-src]').forEach(iframe => {
        iframe.src = iframe.dataset.src;
        iframe.removeAttribute('data-src');
      });
    };

    const showConsentBanner = () => consentBanner.classList.add('active');
    const hideConsentBanner = () => consentBanner.classList.remove('active');

    const initConsent = () => {
      const consent = localStorage.getItem(CONSENT_KEY);
      if (consent === null) showConsentBanner();
    };

    document.getElementById('consent-accept').addEventListener('click', () => {
      localStorage.setItem(CONSENT_KEY, 'accepted');
      hideConsentBanner();
      loadMusicEmbeds();
    });

    document.getElementById('consent-decline').addEventListener('click', () => {
      localStorage.setItem(CONSENT_KEY, 'declined');
      hideConsentBanner();
    });

    const activateTab = (sectionId) => {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.target === sectionId));
      contents.forEach(c => c.classList.toggle('active', c.id === sectionId));
      if (sectionId === 'music') loadMusicEmbeds();
    };

    const openProject = (project) => {
      const url = projectUrls[project];
      if (!url) return;
      softwareFrame.src = url;
      softwarePage.dataset.view = 'frame';
      document.body.dataset.softwareView = 'frame';
    };

    const legalFiles = { impressum: 'impressum.html', datenschutz: 'datenschutz.html' };

    const navigateFromHash = () => {
      const hash = location.hash.replace('#', '');
      const parts = hash.split('/');
      const page = parts[0] || 'music';
      const project = parts[1];

      if (legalFiles[page]) {
        openLegal(legalFiles[page]);
        return;
      }

      closeLegal();
      resetSoftwareView();
      const sectionId = tabTargets[page] || 'music';
      activateTab(sectionId);

      if (page === 'software' && project && projectUrls[project]) {
        openProject(project);
      }
    };

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.target;
        resetSoftwareView();
        activateTab(target);
        const hashName = target === 'shows' ? 'software' : 'music';
        location.hash = hashName;
        window.scrollTo(0, 0);
      });
    });

    document.querySelector('.tabs-logo').addEventListener('click', (e) => {
      if (legalOverlay.classList.contains('active')) {
        e.preventDefault();
        closeLegal();
        location.hash = 'music';
      }
    });

    document.querySelectorAll('.legal-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        openLegal(link.dataset.legal);
        location.hash = link.getAttribute('href').replace('#', '');
      });
    });

    document.querySelectorAll('.tile[data-project]').forEach(tile => {
      tile.addEventListener('click', (e) => {
        e.preventDefault();
        const project = tile.dataset.project;
        openProject(project);
        location.hash = 'software/' + project;
      });
    });

    window.addEventListener('hashchange', navigateFromHash);
    navigateFromHash();
    window.scrollTo(0, 0);
    initConsent();
  </script>
</body>
</html>
